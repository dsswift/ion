name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run actionlint
        uses: raven-actions/actionlint@v2

  file-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check file-size caps
        run: bash scripts/check-file-sizes.sh

  status-writers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check status-writer chokepoints
        # Phase 4 of the state-management overhaul. Prohibits new direct
        # writes to tab.status / inst.statusFields outside the
        # dispatcher chokepoints whitelisted in the script. A failure
        # here is intentional — add your call site to the whitelist
        # only if you have reviewed and approved the engine-vs-client
        # state-ownership rule documented in CLAUDE.md.
        run: bash scripts/check-status-writers.sh

  atv-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Overlay-ATV broadcast parity
        # The overlay and ATV shell are two clients of one event stream:
        # pushes to the overlay renderer must route through broadcast()
        # (which fans out to the ATV mirror) unless the sending file is on
        # the owner-only allowlist in the script, each entry with a reason.
        run: bash scripts/check-atv-parity.sh

  check-logging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: ADR-019 logging standards
        # Enforces the logging standards from ADR-019: no interpolated msg
        # arguments, no console.* calls in the renderer process, no relay
        # slog package-level calls that bypass relayHandler, and no
        # non-canonical field keys. A failure here means a new call site
        # violates the standard — fix the call site, not the script.
        run: bash scripts/check-logging.sh

  dashboards:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        # Node 22.6+ ships native TypeScript type-stripping, which the
        # dashboards generator/checker rely on (zero runtime deps, no
        # npm install). 24 is comfortably above the floor.
        uses: actions/setup-node@v7
        with:
          node-version: '24'
      - name: Dashboards drift + overcount audit
        # Regenerates every provisioned Grafana dashboard JSON and queries.md
        # from the canonical query module and byte-diffs against the committed
        # files; re-runs the range-accumulation-fixed-window structural audit
        # on emitted JSON. A failure here means someone hand-edited a committed
        # dashboard JSON or changed the query module without regenerating.
        # Fix: edit docs/observability/dashboards, run `npm run generate`,
        # commit both. See ADR-020.
        run: make check-dashboards
      - name: Dashboards generator tests
        working-directory: docs/observability/dashboards
        run: npm test

  engine-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: engine/go.mod
      - name: Unit tests with race detector
        working-directory: engine
        run: go test -race ./...
      - name: Contract manifest up to date
        working-directory: engine
        run: go test ./internal/types/ -run TestContractManifest -v
      - name: Integration tests with race detector
        working-directory: engine
        run: go test -race -tags integration ./tests/integration/...

  engine-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: engine/go.mod

      # Full lint on every event (PR and push). We previously ran
      # --new-from-merge-base=origin/main on PRs and full on push, but:
      #
      #  1. Differential mode does not speed up CI — golangci-lint still
      #     analyses the entire module; the flag only post-filters the
      #     report. In practice the two modes ran within ~1s of each
      #     other in this repo.
      #
      #  2. Differential mode let lint debt accumulate invisibly: a PR
      #     would land green, then the immediate push-to-main full run
      #     would surface dozens of pre-existing findings nobody had
      #     incentive to fix. That is exactly what happened to PR #131
      #     (44 errcheck/staticcheck/ineffassign findings, none in the
      #     PR's diff, all surfaced only on merge).
      #
      # Running full lint on PRs means the author may occasionally see
      # findings from elsewhere in the codebase. The cure is a small
      # cleanup commit, not hiding the findings. The module is small
      # enough that a full lint sweep is cheap.
      - name: golangci-lint engine
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: engine
      - name: golangci-lint relay
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.3
          working-directory: relay

  engine-vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: engine/go.mod
      - name: govulncheck (engine)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
        working-directory: engine
      - name: govulncheck (relay)
        run: govulncheck ./...
        working-directory: relay

  relay-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version-file: relay/go.mod
      - name: Unit tests with race detector
        working-directory: relay
        run: go test -race ./...

  desktop-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts
      - name: Type-check
        working-directory: desktop
        run: npm run typecheck
      - name: Run tests
        working-directory: desktop
        run: npm test

  desktop-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: desktop/package-lock.json
      - name: Install dependencies
        working-directory: desktop
        run: npm ci --ignore-scripts
      - name: ESLint
        # Enforces react-hooks/rules-of-hooks and react-hooks/exhaustive-deps
        # as errors in renderer/ — the primary structural gate against React
        # error #185 (infinite re-render loops). Also enforces no-console and
        # no-unstable-nested-components in renderer/. See desktop/eslint.config.mjs.
        working-directory: desktop
        run: npm run lint

  desktop-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: '22'
      - name: npm audit (high+ only, prod deps)
        working-directory: desktop
        run: npm audit --audit-level=high --omit=dev

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Build engine image
        uses: docker/build-push-action@v7
        with:
          context: engine
          push: false
          platforms: linux/amd64
          tags: ion-engine:ci

  ios-build:
    # macos-26 ships Xcode 26 / the iOS 26 SDK. The iOS app contains
    # ios/IonRemote/Services/ModernSpeechEngine.swift, which is gated
    # @available(iOS 26, *) and references iOS-26-only symbols
    # (SpeechAnalyzer, SpeechTranscriber, AnalyzerInput) at file scope.
    # Those symbols do not exist in the iOS 17-18 SDK that Xcode 16 (the
    # default on macos-15) ships, so building on macos-15 fails with
    # exit 65 even though every use site is gated. Xcode 26 is also
    # what our Xcode Cloud iOS job uses.
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v7
      - name: Build iOS app
        working-directory: ios
        run: |
          xcodebuild \
            -project IonRemote.xcodeproj \
            -scheme IonRemote \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            build
