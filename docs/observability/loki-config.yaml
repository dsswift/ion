auth_enabled: false
server:
  http_listen_port: 3100
common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory
query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
schema_config:
  configs:
    - from: 2020-10-24
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h
# R18b: Disable Loki's default 1-hour reject window for old samples.
# Combined with the Alloy stage.timestamp (R18a) that indexes events by their
# original "ts" field rather than ingestion time, this allows archived .bak
# telemetry files (from a schema rotation) to be re-ingested without
# time-rejection errors. The effective history window is 30 days (720h) —
# constrained by Loki retention, not by the reject window.
limits_config:
  reject_old_samples: false
  reject_old_samples_max_age: 720h
ruler:
  alertmanager_url: http://localhost:9093
